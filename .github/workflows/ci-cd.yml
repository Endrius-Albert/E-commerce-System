name: E-commerce CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: ecommerce
          MYSQL_USER: ecommerce
          MYSQL_PASSWORD: ecommerce
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Build WAR with Ant
        run: ant war

      - name: Build backend Docker image
        run: docker build -t ecommerce-backend:latest .

      - name: Start backend container
        run: |
          docker run -d --name ecommerce_backend --network host \
          -e DB_HOST=127.0.0.1 \
          -e DB_PORT=3306 \
          -e DB_NAME=ecommerce \
          -e DB_USER=ecommerce \
          -e DB_PASSWORD=ecommerce \
          ecommerce-backend:latest

      - name: Wait for backend to be ready
        run: |
          for i in {1..60}; do
            docker exec ecommerce_backend curl -f http://localhost:8080/ECommerce/ && break || sleep 2
          done

      - name: Test backend HTTP inside container
        run: docker exec ecommerce_backend curl -f http://localhost:8080/ECommerce/

      - name: Cleanup backend container
        run: docker rm -f ecommerce_backend

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and push Docker image
        run: |
          docker tag ecommerce-backend:latest ${{ secrets.DOCKER_HUB_USERNAME }}/ecommerce-backend:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/ecommerce-backend:latest
